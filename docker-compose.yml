services:
  postgres:
    image: postgres:17
    container_name: clinicflow-postgres
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinicflow}
      POSTGRES_USER: ${POSTGRES_USER:-clinicflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinicflow}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - clinicflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicflow -d clinicflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  clinicflow_data:
